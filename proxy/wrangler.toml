name = "likho-proxy"
main = "src/index.ts"
compatibility_date = "2025-10-01"

# Day 4: dev only — runs at http://localhost:8787 via `wrangler dev`.
# Production deploy comes Day 9+ alongside Clerk auth.

[dev]
port = 8787

# KV namespace for the founding-member waitlist (Day 8).
# `wrangler dev` mocks KV locally so this works without provisioning.
# Before `wrangler deploy`, run:
#     wrangler kv:namespace create LIKHO_KV
# and replace the `id` below with the real namespace id Wrangler prints.
[[kv_namespaces]]
binding = "LIKHO_KV"
id = "3bc0cb004fde47598727e822c5a5a3a2"

# Workers AI binding (Day 10, v0.3.0). Free tier 10K neurons/day — covers
# the entire test phase. Drives /voice when OPENAI_API_KEY / ANTHROPIC_API_KEY
# aren't set: whisper-large-v3-turbo for ASR, llama-3.3-70b for the polish
# step. Same Cloudflare account, no extra signup, no billing required.
# Once we have paying customers and want best-in-class quality, add the
# OPENAI/ANTHROPIC secrets and the worker auto-switches without code change.
[ai]
binding = "AI"

# Cron pre-warm (v0.4.1). Fires every 5 minutes to keep the v8 isolate
# warm — first-request latency drops from ~200ms cold to ~30ms warm.
# The scheduled handler in src/index.ts is a no-op; the cron trigger
# itself is the warming mechanism. Free under Workers' cron quota.
[triggers]
crons = ["*/5 * * * *"]
